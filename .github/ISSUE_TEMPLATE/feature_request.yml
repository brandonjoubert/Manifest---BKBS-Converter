name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the problem you want solved, not only a solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What are you trying to achieve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How might Manifest BKBS Converter help?
    validations:
      required: true

  - type: dropdown
    id: edition
    attributes:
      label: Primarily for which edition?
      options:
        - Both
        - Python
        - PHP
        - Docs / installers only
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
